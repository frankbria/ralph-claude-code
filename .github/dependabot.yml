# Keep SHA-pinned GitHub Actions up to date (Issue #275)
# Dependabot resolves pinned SHAs and maintains the `# vX.Y.Z` tag comments.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
